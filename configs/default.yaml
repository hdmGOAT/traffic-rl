seed: 7
output_dir: outputs

env:
  backend: mock
  intersection_id: intersection_0
  num_lanes: 4
  num_phases: 2
  min_green_time: 5
  decision_interval: 5
  episode_horizon_seconds: 3600

reward:
  type: queue_length

training:
  episodes: 20
  max_steps: 120
  agent_type: dqn
  gamma: 0.95
  learning_rate: 0.001
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay: 0.997
  hidden_dim: 64
  batch_size: 32
  replay_capacity: 5000
  learning_starts: 100
  target_update_interval: 100
  train_frequency: 1

